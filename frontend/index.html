<!DOCTYPE html>
<html lang="en" ng-app="campusHelpdesk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campus Helpdesk System</title>
    <link rel="stylesheet" href="/styles.css" />

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.js"></script>
    <script src="/app.js"></script>
  </head>
  <body ng-controller="RootController as root" ng-class="{'theme-dark': root.theme === 'dark', 'theme-light': root.theme === 'light'}">
    <div class="nav" ng-if="root.isLoggedIn">
      <a href="#!/dashboard">Dashboard</a>
      <a href="#!/complaints">Complaints</a>
      <a href="#!/lost-items">Lost</a>
      <a href="#!/found-items">Found</a>
      <a href="#!/claims">Claims</a>
      <a href="#!/profile">Profile</a>
      <div style="margin-left:auto">
        <button class="secondary" ng-click="root.toggleTheme()">
          {{root.theme === 'dark' ? 'Light Mode' : 'Dark Mode'}}
        </button>
        <button class="secondary" ng-click="root.logout()">Logout</button>
      </div>
    </div>

    <div class="container">
      <div class="error" ng-if="globalError">
        {{globalError}}
      </div>
      <div class="success" ng-if="globalSuccess">
        {{globalSuccess}}
      </div>
      <div ng-view></div>
    </div>

    <!-- Templates -->
    <script type="text/ng-template" id="views/login.html">
      <div class="card">
        <h2>Login</h2>
        <form ng-submit="auth.login()">
          <label>Email</label>
          <input type="email" ng-model="auth.form.email" placeholder="you@college.edu" required />

          <label>Password</label>
          <input type="password" ng-model="auth.form.password" placeholder="••••••••" required />

          <div style="margin-top:14px">
            <button type="submit">Login</button>
          </div>
        </form>

        <p class="muted" style="margin-top:12px">
          No account? <a href="#!/signup">Signup</a>
        </p>
      </div>
    </script>

    <script type="text/ng-template" id="views/signup.html">
      <div class="card">
        <h2>Signup</h2>
        <p class="muted" style="margin-top:-4px">
          Use your correct campus details. Optional profile fields help others identify you during claims and support requests.
        </p>
        <form ng-submit="auth.signup()">
          <label>Name</label>
          <input type="text" ng-model="auth.form.name" placeholder="Your full name" required />

          <label>Email</label>
          <input type="email" ng-model="auth.form.email" placeholder="you@college.edu" required />

          <label>Password</label>
          <input type="password" ng-model="auth.form.password" placeholder="At least 6 characters" required />

          <hr />

          <div class="muted" style="margin-top:-6px">
            Optional profile info (you can leave these blank):
          </div>

          <label>Phone</label>
          <input type="tel" ng-model="auth.form.phone" placeholder="Optional contact number" />

          <label>Department</label>
          <input type="text" ng-model="auth.form.department" placeholder="e.g., CSE, IT, ECE" />

          <label>Year / Semester</label>
          <input type="number" min="1" max="8" ng-model="auth.form.year" placeholder="1 - 8" />

          <label>Hostel (if applicable)</label>
          <input type="text" ng-model="auth.form.hostel" placeholder="Optional" />

          <label>Short Bio</label>
          <textarea ng-model="auth.form.bio" rows="2" placeholder="Optional: add a short note to help identify you (max 280 chars)"></textarea>

          <div style="margin-top:14px">
            <button type="submit">Create Account</button>
          </div>
        </form>

        <p class="muted" style="margin-top:12px">
          Already have an account? <a href="#!/login">Login</a>
        </p>
      </div>
    </script>

    <script type="text/ng-template" id="views/dashboard.html">
      <div class="card">
        <h2>Smart Campus Support System</h2>
        <p class="muted">Quick overview of your campus helpdesk activity and the latest entries across each module.</p>

        <div class="row dashboard-grid">
          <div class="col-6 dashboard-stat">
            <h3>My Complaints</h3>
            <div class="muted">{{dash.myComplaintsCount}} total</div>
            <a href="#!/complaints">Open complaints</a>
          </div>
          <div class="col-6 dashboard-stat">
            <h3>My Lost Reports</h3>
            <div class="muted">{{dash.myLostCount}} total</div>
            <a href="#!/lost-items">Open lost items</a>
          </div>
          <div class="col-6 dashboard-stat">
            <h3>My Found Posts</h3>
            <div class="muted">{{dash.myFoundCount}} total</div>
            <a href="#!/found-items">Open found items</a>
          </div>
          <div class="col-6 dashboard-stat">
            <h3>My Claims</h3>
            <div class="muted">{{dash.myClaimsCount}} total</div>
            <a href="#!/claims">Open claims</a>
          </div>
        </div>

        <div class="card dashboard-section">
          <h3>Quick Actions</h3>
          <div class="row">
            <div class="col-6 dashboard-action qa-complaints">
              <strong>Complaints</strong>
              <div class="muted">Report maintenance, infrastructure, or service issues.</div>
              <a href="#!/complaints">Create / Manage Complaints</a>
            </div>
            <div class="col-6 dashboard-action qa-lost">
              <strong>Lost Items</strong>
              <div class="muted">Post missing items and browse active campus reports.</div>
              <a href="#!/lost-items">Open Lost Items</a>
            </div>
            <div class="col-6 dashboard-action qa-found">
              <strong>Found Items</strong>
              <div class="muted">Add found item details so owners can claim them.</div>
              <a href="#!/found-items">Open Found Items</a>
            </div>
            <div class="col-6 dashboard-action qa-claims">
              <strong>Claims</strong>
              <div class="muted">Track or submit item ownership claims.</div>
              <a href="#!/claims">Open Claims</a>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-6">
            <div class="card dashboard-section">
              <h3>Recent Complaints</h3>
              <div ng-if="dash.recentComplaints.length === 0" class="muted">No complaints yet.</div>
              <div ng-repeat="item in dash.recentComplaints" class="dashboard-item">
                <strong>{{item.title}}</strong>
                <div class="muted">{{item.location}} | {{item.status}}</div>
              </div>
            </div>
          </div>

          <div class="col-6">
            <div class="card dashboard-section">
              <h3>Recent Lost Items</h3>
              <div ng-if="dash.recentLostItems.length === 0" class="muted">No lost items yet.</div>
              <div ng-repeat="item in dash.recentLostItems" class="dashboard-item">
                <strong>{{item.itemName}}</strong>
                <div class="muted">{{item.locationFoundOrLastSeen}} | {{item.status}}</div>
              </div>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-6">
            <div class="card dashboard-section">
              <h3>Recent Found Items</h3>
              <div ng-if="dash.recentFoundItems.length === 0" class="muted">No found items yet.</div>
              <div ng-repeat="item in dash.recentFoundItems" class="dashboard-item">
                <strong>{{item.itemName}}</strong>
                <div class="muted">{{item.locationFound}} | {{item.status}}</div>
              </div>
            </div>
          </div>

          <div class="col-6">
            <div class="card dashboard-section">
              <h3>Recent Claims</h3>
              <div ng-if="dash.recentClaims.length === 0" class="muted">No claims yet.</div>
              <div ng-repeat="item in dash.recentClaims" class="dashboard-item">
                <strong>{{item.type | uppercase}} claim</strong>
                <div class="muted">{{item.claimStatus}} | {{item.message}}</div>
              </div>
            </div>
          </div>
        </div>

        <div style="margin-top:18px" class="muted" ng-if="dash.isStaff">
          Staff/admin view may include broader campus activity than a student account.
        </div>
        <div style="margin-top:18px" class="muted" ng-if="!dash.isStaff">
          Tip: Use the navigation to create/update complaints and lost/found entries, and submit claims.
        </div>
      </div>
    </script>

    <script type="text/ng-template" id="views/complaints.html">
      <div class="card">
        <h2>Complaints</h2>

        <div class="row">
          <div class="col-6">
            <h3>Create Complaint</h3>
            <form ng-submit="complaints.create()">
              <label>Title</label>
              <input type="text" ng-model="complaints.form.title" required />

              <label>Description</label>
              <textarea ng-model="complaints.form.description" rows="3" required></textarea>

              <label>Category</label>
              <select ng-model="complaints.form.category">
                <option value="maintenance">Maintenance</option>
                <option value="infrastructure">Infrastructure</option>
                <option value="services">Services</option>
                <option value="other">Other</option>
              </select>

              <label>Location</label>
              <input type="text" ng-model="complaints.form.location" required />

              <div style="margin-top:14px">
                <button type="submit">Submit</button>
              </div>
            </form>
          </div>

          <div class="col-6">
            <h3>Browse Complaints</h3>
            <div class="muted" style="margin-top:-6px">
              Support complaints you are also facing to help prioritize fixes.
            </div>

            <div style="margin-top:10px; display:flex; gap:10px; align-items:center; flex-wrap:wrap">
              <label style="margin:0">Sort</label>
              <select ng-model="complaints.sortBy" ng-change="complaints.load()">
                <option value="date">Date</option>
                <option value="supports">Supports</option>
                <option value="importance">Importance</option>
              </select>
              <label style="margin:0">Min supports</label>
              <input style="max-width:120px" type="number" min="0" ng-model="complaints.minSupports" ng-change="complaints.load()" placeholder="0" />
              <button class="secondary" ng-click="complaints.load()">Refresh</button>
            </div>

            <div ng-if="complaints.items.length === 0" class="muted" style="margin-top:10px">
              No complaints yet.
            </div>

            <div ng-repeat="c in complaints.items" style="margin-top:16px">
              <strong>{{c.title}}</strong>
              <div class="muted" style="margin-top:4px">
                {{c.category}} | {{c.location}} | Status: {{c.status}} | Total supports: {{c.supportsCount || 0}} | Importance: {{complaints.importanceLabel(c.importanceLevel)}}
              </div>
              <div class="muted" style="margin-top:4px" ng-if="c.createdBy">
                By: {{c.createdBy.name}}
              </div>

              <div class="muted" style="margin-top:6px">
                {{c.description}}
              </div>

              <div style="margin-top:10px">
                <button class="secondary" ng-if="complaints.isOwner(c)" ng-click="complaints.toggleEdit(c._id)">Edit</button>
                <button style="margin-left:8px" ng-if="complaints.isOwner(c)" ng-click="complaints.remove(c._id)">Delete</button>

                <button class="secondary" style="margin-left:8px" ng-if="!complaints.isOwner(c) && !c.supportedByMe" ng-click="complaints.support(c)">
                  Support
                </button>
                <button class="secondary" style="margin-left:8px" ng-if="!complaints.isOwner(c) && c.supportedByMe" ng-click="complaints.unsupport(c)">
                  Supported
                </button>
              </div>

              <div ng-if="c._editing" style="margin-top:12px">
                <label>New Title</label>
                <input type="text" ng-model="c.editTitle" />

                <label>New Description</label>
                <textarea ng-model="c.editDescription" rows="2"></textarea>

                <div style="margin-top:10px">
                  <label>Status (close when resolved)</label>
                  <select ng-model="c.editStatus">
                    <option value="submitted">submitted</option>
                    <option value="in_progress">in_progress</option>
                    <option value="resolved">resolved</option>
                  </select>
                </div>

                <div style="margin-top:10px">
                  <button ng-click="complaints.update(c._id)">Update</button>
                </div>
              </div>

              <div ng-if="complaints.isAdmin" style="margin-top:12px">
                <label>Admin: Set Importance</label>
                <select ng-model="c.editImportanceLevel">
                  <option value="0">Normal</option>
                  <option value="1">Low</option>
                  <option value="2">High</option>
                  <option value="3">Critical</option>
                </select>
                <button style="margin-top:10px" class="secondary" ng-click="complaints.setImportance(c)">Save Importance</button>
              </div>

              <hr />
            </div>
          </div>
        </div>
      </div>
    </script>

    <script type="text/ng-template" id="views/lost-items.html">
      <div class="card">
        <h2>Lost Items</h2>

        <div class="row">
          <div class="col-6">
            <h3>Report Lost Item</h3>
            <form ng-submit="lost.create()">
              <label>Item Name</label>
              <input type="text" ng-model="lost.form.itemName" required />

              <label>Description</label>
              <textarea ng-model="lost.form.description" rows="3" required></textarea>

              <label>Last Seen / Found Location</label>
              <input type="text" ng-model="lost.form.locationFoundOrLastSeen" required />

              <label>Date</label>
              <input type="date" ng-model="lost.form.date" required />

              <div style="margin-top:14px">
                <button type="submit">Submit</button>
              </div>
            </form>
          </div>

          <div class="col-6">
            <h3>Browse / Update</h3>
            <div class="muted">
              Students can claim active items from the whole campus.
            </div>

            <div style="margin-top:10px; display:flex; gap:10px; align-items:center">
              <button class="secondary" ng-click="lost.setStatus('active')">Active</button>
              <button class="secondary" ng-click="lost.setStatus('closed')">Closed</button>
              <button style="margin-left:auto" ng-click="lost.load()">Refresh</button>
            </div>

            <div ng-if="lost.items.length === 0" class="muted" style="margin-top:10px">
              No lost items found.
            </div>

            <div ng-repeat="x in lost.items" style="margin-top:16px">
              <strong>{{x.itemName}}</strong>
              <div class="muted" style="margin-top:4px">
                {{x.locationFoundOrLastSeen}} | Status: {{x.status}}
              </div>
              <div class="muted" style="margin-top:6px">
                {{x.description}}
              </div>

              <div style="margin-top:10px">
                <button class="secondary" ng-if="lost.isOwner(x)" ng-click="lost.toggleEdit(x._id)">Edit</button>
                <button class="secondary" style="margin-left:8px" ng-if="lost.isOwner(x) && x.status === 'active'" ng-click="lost.close(x)">Close</button>
                <button class="secondary" style="margin-left:8px" ng-if="lost.isOwner(x) && x.status === 'closed'" ng-click="lost.reopen(x)">Reopen</button>
                <button style="margin-left:8px" ng-if="lost.statusFilter === 'active' && !lost.isOwner(x)" ng-click="lost.startClaim('lost', x._id)">
                  Claim
                </button>
              </div>

              <div ng-if="x._editing" style="margin-top:12px">
                <label>Item Name</label>
                <input type="text" ng-model="x.editItemName" />

                <label>Description</label>
                <textarea ng-model="x.editDescription" rows="2"></textarea>

                <label>Last Seen / Location</label>
                <input type="text" ng-model="x.editLocationFoundOrLastSeen" />

                <div style="margin-top:10px">
                  <label>Status</label>
                  <select ng-model="x.editStatus">
                    <option value="active">active</option>
                    <option value="closed">closed</option>
                  </select>
                </div>

                <div style="margin-top:10px">
                  <button ng-click="lost.update(x._id)">Update</button>
                </div>
              </div>
              <hr />
            </div>
          </div>
        </div>
      </div>
    </script>

    <script type="text/ng-template" id="views/found-items.html">
      <div class="card">
        <h2>Found Items</h2>

        <div class="row">
          <div class="col-6">
            <h3>Post Found Item</h3>
            <form ng-submit="found.create()">
              <label>Item Name</label>
              <input type="text" ng-model="found.form.itemName" required />

              <label>Description</label>
              <textarea ng-model="found.form.description" rows="3" required></textarea>

              <label>Found Location</label>
              <input type="text" ng-model="found.form.locationFound" required />

              <label>Date</label>
              <input type="date" ng-model="found.form.date" required />

              <div style="margin-top:14px">
                <button type="submit">Submit</button>
              </div>
            </form>
          </div>

          <div class="col-6">
            <h3>Browse / Update</h3>
            <div style="margin-top:10px; display:flex; gap:10px; align-items:center">
              <button class="secondary" ng-click="found.setStatus('active')">Active</button>
              <button class="secondary" ng-click="found.setStatus('closed')">Closed</button>
              <button style="margin-left:auto" ng-click="found.load()">Refresh</button>
            </div>

            <div ng-if="found.items.length === 0" class="muted" style="margin-top:10px">
              No found items found.
            </div>

            <div ng-repeat="x in found.items" style="margin-top:16px">
              <strong>{{x.itemName}}</strong>
              <div class="muted" style="margin-top:4px">
                {{x.locationFound}} | Status: {{x.status}}
              </div>
              <div class="muted" style="margin-top:6px">
                {{x.description}}
              </div>

              <div style="margin-top:10px">
                <button class="secondary" ng-if="found.isOwner(x)" ng-click="found.toggleEdit(x._id)">Edit</button>
                <button class="secondary" style="margin-left:8px" ng-if="found.isOwner(x) && x.status === 'active'" ng-click="found.close(x)">Close</button>
                <button class="secondary" style="margin-left:8px" ng-if="found.isOwner(x) && x.status === 'closed'" ng-click="found.reopen(x)">Reopen</button>
                <button style="margin-left:8px" ng-if="found.statusFilter === 'active' && !found.isOwner(x)" ng-click="found.startClaim('found', x._id)">
                  Claim
                </button>
              </div>

              <div ng-if="x._editing" style="margin-top:12px">
                <label>Item Name</label>
                <input type="text" ng-model="x.editItemName" />

                <label>Description</label>
                <textarea ng-model="x.editDescription" rows="2"></textarea>

                <label>Found Location</label>
                <input type="text" ng-model="x.editLocationFound" />

                <div style="margin-top:10px">
                  <label>Status</label>
                  <select ng-model="x.editStatus">
                    <option value="active">active</option>
                    <option value="closed">closed</option>
                  </select>
                </div>

                <div style="margin-top:10px">
                  <button ng-click="found.update(x._id)">Update</button>
                </div>
              </div>
              <hr />
            </div>
          </div>
        </div>
      </div>
    </script>

    <script type="text/ng-template" id="views/claims.html">
      <div class="card">
        <h2>Claims</h2>

        <div class="row">
          <div class="col-6">
            <h3>Create Claim</h3>
            <form ng-submit="claims.create()">
              <label>Type</label>
              <select ng-model="claims.form.type" ng-change="claims.onTypeChange()">
                <option value="lost">lost</option>
                <option value="found">found</option>
              </select>

              <label>Item</label>
              <select ng-model="claims.form.itemId">
                <option ng-repeat="it in claims.activeItems" value="{{it._id}}">
                  {{it.itemName}}
                </option>
              </select>

              <label>Message / Proof</label>
              <textarea ng-model="claims.form.message" rows="3" required></textarea>

              <div style="margin-top:14px">
                <button type="submit">Submit Claim</button>
              </div>
            </form>
            <div class="muted" style="margin-top:10px">
              Claim item must be in <b>active</b> status.
            </div>
          </div>

          <div class="col-6">
            <h3>Your Claims</h3>
            <div style="margin-top:10px">
              <button class="secondary" ng-click="claims.load()">Refresh</button>
            </div>

            <div ng-if="claims.items.length === 0" class="muted" style="margin-top:10px">
              No claims yet.
            </div>

            <div ng-repeat="cl in claims.items" style="margin-top:16px">
              <strong>{{cl.type}} claim</strong>
              <div class="muted" style="margin-top:4px">
                Status: {{cl.claimStatus}}
              </div>

              <div class="muted" style="margin-top:6px">
                {{cl.message}}
              </div>

              <div style="margin-top:10px" ng-if="claims.isStaff">
                <label>Update Claim Status</label>
                <select ng-model="cl.editClaimStatus">
                  <option value="pending">pending</option>
                  <option value="approved">approved</option>
                  <option value="rejected">rejected</option>
                  <option value="resolved">resolved</option>
                </select>
                <button ng-click="claims.update(cl._id)">Update</button>
              </div>

              <div style="margin-top:10px" ng-if="!claims.isStaff && cl.claimStatus === 'pending' && cl.claimedBy.id === claims.userId">
                <label>Edit Message</label>
                <textarea ng-model="cl.editMessage" rows="2"></textarea>
                <button ng-click="claims.update(cl._id)">Update</button>
                <button style="margin-left:8px" ng-click="claims.remove(cl._id)">Delete</button>
              </div>

              <hr />
            </div>
          </div>
        </div>
      </div>
    </script>

    <script type="text/ng-template" id="views/profile.html">
      <div class="card">
        <h2>Profile</h2>

        <div class="muted">Logged in as:</div>
        <div style="margin-top:6px"><b>{{profile.user.name}}</b></div>
        <div class="muted">{{profile.user.email}}</div>
        <div class="muted" style="margin-top:6px">Role: {{profile.user.role}}</div>

        <hr />
        <h3>Activity</h3>
        <div class="muted">Items lost: <b>{{profile.activity.lostItemsReported || 0}}</b></div>
        <div class="muted">Items found: <b>{{profile.activity.foundItemsPosted || 0}}</b></div>
        <div class="muted">Complaints raised: <b>{{profile.activity.complaintsRaised || 0}}</b></div>
        <div class="muted">Supports given: <b>{{profile.activity.supportsGiven || 0}}</b></div>
      </div>
    </script>
  </body>
</html>
